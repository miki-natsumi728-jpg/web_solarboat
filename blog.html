<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>News | 東京大学ソーラーボートレーシング</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <div class="nav-top">
      <img src="images/Yatagarasu.png"/>
      <div class="brand">
        <b>東京大学ソーラーボートレーシング</b>
        <span>次世代のボート開発への挑戦</span>
      </div>
    </div>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="blog.html">News</a>
      <a href="sponsors.html">Sponsors</a>
      <a href="join us.html">Join Us</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>

<main class="container">
  <section class="card">
    <div class="card-pad">
      <div class="h1">News / Blog</div>
    </div>
    <div class="card-pad" id="newsList"></div>
  </section>
</main>

<script>
async function loadAll(){
  const res = await fetch("data/posts.json");
  const posts = await res.json();
  posts.sort((a,b)=> (a.date < b.date ? 1 : -1));

  const root = document.getElementById("newsList");
  root.className = "news-list";

  root.innerHTML = posts.map(p => `
    <a class="news-item" href="post.html?slug=${encodeURIComponent(p.slug)}">
      <img src="${p.image}" alt="">
      <div>
        <div class="news-meta">${p.date} / ${p.category || "Update"}</div>
        <div class="news-title">${p.title}</div>
        <p class="news-lead">${p.lead}</p>
      </div>
    </a>
  `).join("");
}
loadAll();
</script>

</body>
</html>
