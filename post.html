<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
function getSlug(){
  const u = new URL(location.href);
  return u.searchParams.get("slug");
}

async function loadPost(){
  const slug = getSlug();
  if(!slug){
    document.getElementById("postRoot").innerHTML = "<div class='muted'>記事が指定されていません。</div>";
    return;
  }

  const postsRes = await fetch("data/posts.json");
  const posts = await postsRes.json();
  const meta = posts.find(p => p.slug === slug);
  if(!meta){
    document.getElementById("postRoot").innerHTML = "<div class='muted'>記事が見つかりませんでした。</div>";
    return;
  }

  document.title = meta.title + " | 東京大学ソーラーボートレーシング";

  const mdRes = await fetch(meta.md);
  const md = await mdRes.text();
  const html = marked.parse(md);

  document.getElementById("postRoot").innerHTML = `
    <h1>${meta.title}</h1>
    <div class="meta">${meta.date} / ${meta.category || "Update"}</div>
    ${meta.image ? `<img src="${meta.image}" alt="">` : ""}
    <div class="body">${html}</div>
  `;
}

loadPost();

// Hamburger menu toggle
document.addEventListener('DOMContentLoaded', function() {
  const hamburger = document.querySelector('.hamburger');
  const navLinks = document.querySelector('.nav-links');

  if (!hamburger || !navLinks) return;

  hamburger.addEventListener('click', function() {
    navLinks.classList.toggle('active');
  });
});

</script>
