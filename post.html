<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Post | 東京大学ソーラーボートレーシング</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <div class="nav-top">
      <img src="images/Yatagarasu.png"/>
      <div class="brand">
        <b>東京大学ソーラーボートレーシング</b>
        <span>次世代のボート開発への挑戦</span>
      </div>
    </div>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="blog.html">News</a>
      <a href="sponsors.html">Sponsors</a>
      <a href="join us.html">Join Us</a>
      <a href="contact.html">Contact</a>
    </nav>
    <button class="hamburger" aria-label="メニューを開く">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</header>

<main class="container">
  <article class="card article">
    <div class="card-pad">
      <a class="muted" href="blog.html">← News一覧へ</a>
    </div>
    <div class="card-pad" id="postRoot">
      <div class="muted">読み込み中…</div>
    </div>
  </article>

  <div class="footer">
    © 東京大学ソーラーボートレーシング
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
function getSlug(){
  const u = new URL(location.href);
  return u.searchParams.get("slug");
}

async function loadPost(){
  const slug = getSlug();
  if(!slug){
    document.getElementById("postRoot").innerHTML = "<div class='muted'>記事が指定されていません。</div>";
    return;
  }

  const postsRes = await fetch("data/posts.json");
  const posts = await postsRes.json();
  const meta = posts.find(p => p.slug === slug);
  if(!meta){
    document.getElementById("postRoot").innerHTML = "<div class='muted'>記事が見つかりませんでした。</div>";
    return;
  }

  document.title = meta.title + " | 東京大学ソーラーボートレーシング";

  const mdRes = await fetch(meta.md);
  const md = await mdRes.text();
  const html = marked.parse(md);

  document.getElementById("postRoot").innerHTML = `
    <h1>${meta.title}</h1>
    <div class="meta">${meta.date} / ${meta.category || "Update"}</div>
    ${meta.image ? `<img src="${meta.image}" alt="">` : ""}
    <div class="body">${html}</div>
  `;
}

loadPost();

// Hamburger menu toggle
document.addEventListener('DOMContentLoaded', function() {
  const hamburger = document.querySelector('.hamburger');
  const navLinks = document.querySelector('.nav-links');

  if (!hamburger || !navLinks) return;

  hamburger.addEventListener('click', function() {
    navLinks.classList.toggle('active');
  });
});

</script>

</body>
</html>
