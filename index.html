<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>東京大学ソーラーボートレーシング</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>

<body>
  
<header class="nav">
  <div class="nav-inner">
    <div class="brand">
      <b>東京大学ソーラーボートレーシング</b>
      <span>次世代のボート開発への挑戦</span>
    </div>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="project.html">Project</a>
      <a href="blog.html">News</a>
      <a href="sponsor.html">Sponsor</a>
      <a href="recruit.html">Recruit</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>

<main class="container">

  <section class="hero">
    <img src="images/top1.jpg">
    <div class="hero-overlay">
      <div class="hero-content">
        <div class="kicker">The University of Tokyo</div>
        <div class="h1">東京大学ソーラーボートレーシング</div>
        <p class="lead">次世代のボート開発への挑戦。太陽エネルギーと設計・制御・実証をつなぎ、速く、静かで、持続可能な水上モビリティを追求します。</p>
        <div class="btns">
          <!-- 後でリンク差し替え -->
          <a class="btn" href="https://instagram.com/" target="_blank" rel="noopener">Instagram</a>
          <a class="btn" href="https://youtube.com/" target="_blank" rel="noopener">YouTube</a>
        </div>
      </div>
    </div>
  </section>

  <div style="height:14px"></div>

  <section class="grid two">
    <div class="card">
      <div class="card-pad">
        <div class="h2">最新ニュース</div>
        <div class="muted">大会・実証・開発進捗の告知と記録を掲載します。</div>
      </div>
      <div id="latestNews" class="card-pad news-list"></div>
    </div>

    <aside class="card">
      <div class="card-pad">
        <div class="h2">ハイライト</div>
      </div>
      <div class="card-pad">
        <img src="images/highlight1.jpg" alt="チーム写真" style="width:100%; border-radius:16px; border:1px solid rgba(255,255,255,.12);" />
        <div style="height:10px"></div>
        <img src="images/highlight2.jpg" alt="ボート写真" style="width:100%; border-radius:16px; border:1px solid rgba(255,255,255,.12);" />
      </div>
    </aside>
  </section>

  <div class="footer">
    © 東京大学ソーラーボートレーシング / Built with GitHub Pages
  </div>

</main>

<script>
async function loadLatest(){
  const res = await fetch("data/posts.json");
  const posts = await res.json();
  posts.sort((a,b)=> (a.date < b.date ? 1 : -1));
  const top3 = posts.slice(0,3);

  const root = document.getElementById("latestNews");
  root.className = "news-list";

  root.innerHTML = top3.map(p => `
    <a class="news-item" href="post.html?slug=${encodeURIComponent(p.slug)}">
      <img src="${p.image}" alt="">
      <div>
        <div class="news-meta">${p.date}</div>
        <div class="news-title">${p.title}</div>
        <p class="news-lead">${p.lead}</p>
      </div>
    </a>
  `).join("");
}
loadLatest();
</script>

</body>
</html>
