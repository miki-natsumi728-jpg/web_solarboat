<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>東京大学ソーラーボートレーシング</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>

<body>

<header class="nav">
  <div class="nav-inner">
    <a href="index.html">
      <div class="nav-top">
        <img src="images/Yatagarasu.png"/>
        <div class="brand">
          <b>東京大学ソーラーボートレーシング</b>
          <span>次世代のボート開発への挑戦</span>
        </div>
      </div>
    </a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="blog.html">News</a>
      <a href="sponsors.html">Sponsors</a>
      <a href="join us.html">Join Us</a>
      <a href="contact.html">Contact</a>
    </nav>
    <button class="hamburger" aria-label="メニューを開く">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</header>
<section class="hero">
    <div class="hero-overlay">
      <div class="hero-content">
        <div class="h1">東京大学ソーラーボートレーシング</div>
        <p class="lead">デジタルツイン・シミュレーション環境を構築した次世代のボート開発への挑戦<br>学生の手でソーラーボートを創り、海上を駆ける。</p>
        </div>
        <a class="hero_aboutus" href="/about.html">
          >>詳細はこちら<<
        </a>
      </div>
    </div>
  </section>

<main class="container">

  <div style="height:14px"></div>

  <section class="grid">
    <a href="may_festival.html">
      <div class="card">
        <div class="card-pad">
          <div class="h1">五月祭特設ページ開設中！</div>
        </div>
      </div>
    </a>
  </section>

  <div style="height:14px"></div>

  <section class="grid two">
    <div class="card">
      <div class="card-pad">
        <div class="h2">最新ニュース</div>
        <div class="muted">大会・実証・開発進捗の告知と記録を掲載します。</div>
      </div>
      <div id="latestNews" class="card-pad news-list"></div>
    </div>

    <aside class="card">
      <div class="card-pad">
        <div class="h2">ハイライト</div>
      </div>
      <div class="card-pad">
        <img src="images/highlight1.jpg" alt="チーム写真" style="width:100%; border-radius:16px; border:1px solid rgba(255,255,255,.12);" />
        <div style="height:10px"></div>
        <img src="images/highlight2.jpg" alt="ボート写真" style="width:100%; border-radius:16px; border:1px solid rgba(255,255,255,.12);" />
      </div>
    </aside>
  </section>

  <div class="footer">
    © 東京大学ソーラーボートレーシング / Built with GitHub Pages
  </div>

</main>

<script>
async function loadLatest(){
  const res = await fetch("data/posts.json");
  const posts = await res.json();
  posts.sort((a,b)=> (a.date < b.date ? 1 : -1));
  const top3 = posts.slice(0,3);

  const root = document.getElementById("latestNews");
  root.className = "news-list";

  root.innerHTML = top3.map(p => `
    <a class="news-item" href="post.html?slug=${encodeURIComponent(p.slug)}">
      <img src="${p.image}" alt="">
      <div>
        <div class="news-meta">${p.date}</div>
        <div class="news-title">${p.title}</div>
        <p class="news-lead">${p.lead}</p>
      </div>
    </a>
  `).join("");
}
loadLatest();

// Hamburger menu toggle
document.addEventListener('DOMContentLoaded', function() {
  const hamburger = document.querySelector('.hamburger');
  const navLinks = document.querySelector('.nav-links');

  hamburger.addEventListener('click', function() {
    navLinks.classList.toggle('active');
  });
});
</script>

</body>
</html>
